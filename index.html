<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>たばこ記録ツール</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
background:#f5f6fa;
padding:20px;
margin:0;
}

.container{
max-width:700px;
margin:auto;
}

.card{
background:white;
padding:18px;
border-radius:14px;
margin-bottom:16px;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

h1,h2{margin-top:0}

button{
width:100%;
padding:16px;
font-size:20px;
border:none;
border-radius:12px;
background:#2563eb;
color:white;
font-weight:bold;
cursor:pointer;
}

button:active{transform:scale(0.97)}

.stats{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.stat{
background:#f1f3f8;
padding:12px;
border-radius:10px;
text-align:center;
}

.stat-title{
font-size:13px;
color:#666;
}

.stat-value{
font-size:24px;
font-weight:bold;
}

input{
padding:10px;
border-radius:8px;
border:1px solid #ddd;
font-size:16px;
}

.row{
display:flex;
gap:10px;
margin-top:10px;
}

.money{
font-size:20px;
font-weight:bold;
color:#dc2626;
}

ul{
list-style:none;
padding:0;
max-height:250px;
overflow:auto;
}

li{
padding:8px 0;
border-bottom:1px solid #eee;
font-size:14px;
}

canvas{
max-height:250px;
}

</style>
</head>

<body>

<div class="container">

<div class="card">
<h1>🚬 たばこ記録</h1>
<button id="recordBtn">1本吸った</button>
</div>

<div class="card">
<h2>今日の状況</h2>

<div class="stats">
<div class="stat">
<div class="stat-title">今日の本数</div>
<div class="stat-value" id="todayCount">0</div>
</div>

<div class="stat">
<div class="stat-title">上限</div>
<div class="stat-value" id="limitCount">10</div>
</div>

<div class="stat">
<div class="stat-title">残り</div>
<div class="stat-value" id="remainCount">10</div>
</div>
</div>

<div class="row">
<input type="number" id="limitInput" value="10">
<button id="saveLimit">保存</button>
</div>

</div>

<div class="card">
<h2>💰 今日使った金額</h2>
<div class="money" id="moneyToday">0円</div>

<div class="row">
<input type="number" id="priceInput" value="600">
<span>円 / 1箱</span>
</div>

<p style="font-size:13px;color:#666">※1箱20本で計算</p>
</div>

<div class="card">
<h2>📊 1週間の本数</h2>
<canvas id="weekChart"></canvas>
</div>

<div class="card">
<h2>今日の記録</h2>
<ul id="logList"></ul>
</div>

</div>

<script>

const LOG_KEY="smoke_logs";
const LIMIT_KEY="smoke_limit";
const PRICE_KEY="smoke_price";

function getLogs(){
return JSON.parse(localStorage.getItem(LOG_KEY)||"[]")
}

function saveLogs(logs){
localStorage.setItem(LOG_KEY,JSON.stringify(logs))
}

function todayString(d){
return new Date(d).toISOString().slice(0,10)
}

function today(){
return new Date().toISOString().slice(0,10)
}

function getLimit(){
return Number(localStorage.getItem(LIMIT_KEY)||10)
}

function setLimit(v){
localStorage.setItem(LIMIT_KEY,v)
}

function getPrice(){
return Number(localStorage.getItem(PRICE_KEY)||500)
}

function setPrice(v){
localStorage.setItem(PRICE_KEY,v)
}

function render(){

const logs=getLogs()
const todayLogs=logs.filter(l=>todayString(l)==today())

const todayCount=todayLogs.length
const limit=getLimit()


// counts

document.getElementById("todayCount").textContent=todayCount

document.getElementById("limitCount").textContent=limit

document.getElementById("remainCount").textContent=Math.max(limit-todayCount,0)


// money

const price=getPrice()

const perCig=price/20

const money=Math.round(todayCount*perCig)


document.getElementById("moneyToday").textContent=money+"円"


// log list

const list=document.getElementById("logList")

list.innerHTML=""


[...todayLogs].reverse().forEach(l=>{

const li=document.createElement("li")

li.textContent=new Date(l).toLocaleTimeString()

list.appendChild(li)

})


renderChart()

}


function renderChart(){

const logs=getLogs()

let labels=[]

let data=[]

for(let i=6;i>=0;i--){

const d=new Date()

d.setDate(d.getDate()-i)

const key=d.toISOString().slice(0,10)

labels.push(key.slice(5))


const count=logs.filter(l=>todayString(l)==key).length

data.push(count)

}


const ctx=document.getElementById("weekChart")

if(window.chart)window.chart.destroy()

window.chart=new Chart(ctx,{type:"bar",

data:{labels:labels,

datasets:[{label:"本数",

data:data}]
}

})

}



// record


document.getElementById("recordBtn").onclick=()=>{

const logs=getLogs()

logs.push(new Date().toISOString())

saveLogs(logs)

render()

}



// save limit


document.getElementById("saveLimit").onclick=()=>{

setLimit(document.getElementById("limitInput").value)

render()

}



// price


document.getElementById("priceInput").value=getPrice()


document.getElementById("priceInput").onchange=e=>{

setPrice(e.target.value)

render()

}


render()

</script>

</body>
</html>
